name: 同步(Code + Releases)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  sync-code:
    runs-on: ubuntu-latest
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加源仓库为上游
        run: |
          if [ -n "${{ secrets.SOURCE_REPO_TOKEN }}" ]; then
            git remote add upstream https://${{ secrets.SOURCE_REPO_TOKEN }}@github.com/OpenListTeam/OpenList.git
          else
            git remote add upstream https://github.com/OpenListTeam/OpenList.git
          fi

      - name: 从源仓库获取所有分支和标签
        run: |
          git fetch upstream --tags --force

      - name: 推送所有分支和标签到目标仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force --all "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force --tags "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

  sync-releases:
    runs-on: ubuntu-latest
    needs: sync-code
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4

      - name: 使用 GitHub CLI 获取源仓库 Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          SOURCE_REPO="OpenListTeam/OpenList"
          if [ -n "$SOURCE_TOKEN" ]; then
            export GH_TOKEN="$SOURCE_TOKEN"
          fi

          gh api \
            -H "Accept: application/vnd.github.v3+json" \
            "/repos/${SOURCE_REPO}/releases" \
            --paginate \
            --jq 'sort_by(.published_at) | .[] | {tag_name: .tag_name, body: .body, assets: .assets}' > releases.json

          if [ ! -s releases.json ]; then
            echo "没有获取到任何 Releases"
            exit 1
          fi

      - name: 按顺序处理每个 Release（修复管道断裂）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_REPO="${{ github.repository }}"
          FAILED=0

          # 将 releases 写入临时文件，避免管道问题
          jq -c '.' releases.json > releases_lines.txt

          while IFS= read -r release; do
            TAG_NAME=$(echo "$release" | jq -r '.tag_name')
            BODY=$(echo "$release" | jq -r '.body // ""')

            echo "正在处理 Release: $TAG_NAME"

            if gh release view "$TAG_NAME" --repo "$TARGET_REPO" &>/dev/null; then
              echo "Release $TAG_NAME 已存在，跳过创建"
            else
              echo "创建 Release $TAG_NAME..."
              if ! gh release create "$TAG_NAME" \
                --repo "$TARGET_REPO" \
                --title "$TAG_NAME" \
                --notes "$BODY"; then
                echo "创建 Release $TAG_NAME 失败"
                FAILED=1
                continue  # 跳过附件上传，继续下一个
              fi
            fi

            # 处理附件
            ASSETS=$(echo "$release" | jq -r '.assets[]?.browser_download_url')
            if [ -n "$ASSETS" ] && [ "$ASSETS" != "null" ]; then
              TEMP_DIR=$(mktemp -d)
              cd "$TEMP_DIR"

              echo "$ASSETS" | while read -r url; do
                if [ -n "$url" ]; then
                  curl -s -fL -O "$url" || echo "下载失败: $url"
                fi
              done

              for file in *; do
                if [ -f "$file" ]; then
                  if ! gh release upload "$TAG_NAME" "$file" \
                    --repo "$TARGET_REPO" \
                    --clobber; then
                    echo "上传附件 $file 失败"
                    FAILED=1
                  fi
                fi
              done

              cd ..
              rm -rf "$TEMP_DIR"
            fi

            echo "------------------------"
          done < releases_lines.txt

          rm -f releases_lines.txt

          if [ $FAILED -ne 0 ]; then
            echo "部分 Release 处理失败，请检查日志"
            exit 1
          fi
