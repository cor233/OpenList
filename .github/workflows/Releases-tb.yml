- name: Releases 同步

  env:
    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    SOURCE_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
  run: |
    SOURCE_REPO="OpenListTeam/OpenList"
    
    if [ -n "$SOURCE_TOKEN" ]; then
      export GH_TOKEN="$SOURCE_TOKEN"
    fi
    
    # 修复：不使用管道，直接输出到文件
    gh api \
      -H "Accept: application/vnd.github.v3+json" \
      "/repos/${SOURCE_REPO}/releases" \
      --paginate > raw_releases.json
    
    # 单独使用 jq 处理文件
    if [ -s raw_releases.json ]; then
      jq 'sort_by(.published_at) | .[] | {tag_name: .tag_name, body: .body, assets: .assets}' raw_releases.json > releases.json
      rm raw_releases.json
    else
      echo "没有获取到任何 Releases"
      exit 1
    fi
